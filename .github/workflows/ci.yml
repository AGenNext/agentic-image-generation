name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
            
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov coverage pytest-xdist pytest-timeout
          pip install bandit safety pylint flake8 black mypy types-python-dateio
          
      - name: Run tests
        run: pytest -v --cov=. --cov-report=xml --tb=short || true
        continue-on-error: true
          
      - name: Run coverage
        run: coverage report --fail-under=0 || true
        continue-on-error: true
          
      - name: Run bandit (security)
        run: bandit -r . -x ./.git || true
        continue-on-error: true
          
      - name: Run safety (vulnerabilities)
        run: safety check || true
        continue-on-error: true
          
      - name: Run pylint
        run: pylint **/*.py --disable=all --enable=E,F || true
        continue-on-error: true
          
      - name: Run flake8
        run: flake8 . --count --statistics || true
        continue-on-error: true
          
      - name: Run black (check format)
        run: black --check . || true
        continue-on-error: true
          
      - name: Run mypy (type check)
        run: mypy . --ignore-missing-imports || true
        continue-on-error: true
